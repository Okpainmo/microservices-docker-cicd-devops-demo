name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Linting Tools
        run: |
          pip install flake8
          cd frontend && npm install

      - name: Lint Python
        run: flake8 .

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint .

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build and push images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:latest ./api
          docker build -t frontend:latest ./frontend
          docker build -t worker:latest ./worker

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "api:latest"
          format: "sarif"
          output: "trivy-results-api.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "frontend:latest"
          format: "sarif"
          output: "trivy-results-frontend.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "worker:latest"
          format: "sarif"
          output: "trivy-results-worker.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "trivy-results-*.sarif"

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cp .env.example .env
          docker-compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            HEALTHY_COUNT=$(docker ps --filter "health=healthy" -q | wc -l)
            echo "Healthy containers: $HEALTHY_COUNT/4"
            if [ "$HEALTHY_COUNT" -eq 4 ]; then
              echo "All services are healthy!"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy in time"
          docker-compose ps
          docker-compose logs
          exit 1

      - name: Run integration test script
        run: |
          RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"title": "Integration Test"}' http://localhost:3000/submit)
          JOB_ID=$(echo $RESPONSE | jq -r .job_id)
          echo "Submitted job: $JOB_ID"
          if [ "$JOB_ID" == "null" ] || [ -z "$JOB_ID" ]; then 
            echo "Failed to submit job. Response: $RESPONSE"
            exit 1
          fi

          STATUS="queued"
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r .status)
            echo "Current status: $STATUS"
            if [ "$STATUS" == "completed" ]; then break; fi
            sleep 2
          done

          if [ "$STATUS" != "completed" ]; then
            echo "Job did not complete in time"
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker-compose down
